        // Переменная для отслеживания предыдущей позиции прокрутки
        let lastScrollPosition = 0;

        // Функция обработки прокрутки
        function handleScroll() {
            const currentScrollPosition = window.scrollY || window.pageYOffset;

            // Проверяем направление прокрутки
            if (currentScrollPosition > lastScrollPosition + 0.5 && Date.now() - startTime >= 50) {
                location.href = 'https://foxvideo-web.github.io/Web/videos.html';
            }

            lastScrollPosition = currentScrollPosition;
        }

        // Начало отсчета времени
        let startTime = Date.now();

        // Назначаем слушатель прокрутки
        window.addEventListener('scroll', handleScroll);

        // Первая загрузка случайной ссылки
        function setRandomLink() {
            const randomIndex = Math.floor(Math.random() * links.length);
            document.getElementById('randomIframe').src = links[randomIndex];
        }

        // Выполняем при загрузке страницы
        window.onload = setRandomLink;
