<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Прямо выключаем глобальную прокрутку */
        }
        #page-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Включаем прокрутку только внутри блока */
        }
    </style>
</head>
<body>
    <div id="page-container">
        <iframe src="https://foxvideocommunity.wordpress.com" width="100%" height="100%" seamless></iframe>
    </div>
</body>
</html>
