<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox video Web</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Отключаем основную прокрутку */
        }
        iframe {
            width: 100vw;
            height: calc(100vh + 50px); /* Увеличиваем высоту на 50 пикселей */
            border: none;
            transition: transform 0.3s ease; /* Анимация перемещения */
        }
    </style>
</head>
<body>

<!-- Элемент iframe -->
<iframe id="video-frame" src=""></iframe>

<script>
document.addEventListener("DOMContentLoaded", () => {
    // Получаем текущую URL страницы
    const currentUrl = window.location.href;

    // Разбиваем URL и проверяем наличие параметра "chanell"
    const urlParams = new URLSearchParams(currentUrl.split('?')[1]);
    const chanell = urlParams.get('chanell'); // Получаем значение параметра chanell
    const page = urlParams.get('page');
    const date = urlParams.get('date');
    const id = urlParams.get('id');

    // Основная ссылка
    const baseUrl = "https://foxvideocommunity.wordpress.com";

    // Новый URL в зависимости от наличия переменной chanell
    let updatedUrl = "";
    if (chanell) {
        updatedUrl = `${baseUrl}/channels/${chanell}`;
    } else if (page) {
        updatedUrl = `${baseUrl}/${page}`;
    } else {
        updatedUrl = baseUrl;
    }
    if (date,chanell,id) {
        updatedUrl = `${baseUrl}/${date}/${chanell}-${id}`;
    }

    // Изменяем источник фрейма
    const videoFrame = document.getElementById("video-frame");
    videoFrame.src = updatedUrl;

    // Настройка положения фрейма
    if (chanell) {
        // Если параметр есть, сдвигаем фрейм вниз на 200px
        videoFrame.style.transform = "translateY(-50px)";
    } else if (page) {
        // Если параметра нет, оставляем фрейм сверху (смещаем вверх на 200px)
        videoFrame.style.transform = "translateY(-50px)";
    } else {
        videoFrame.style.transform = "translateY(-50px)";
    }
});
</script>

</body>
</html>
