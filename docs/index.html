<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Убираем общую прокрутку */
        }
        #wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Внутренняя прокрутка только в рамках wrapper'а */
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <iframe src="https://foxvideocommunity.wordpress.com" width="100%" height="100%" seamless></iframe>
    </div>
</body>
</html>
