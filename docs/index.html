<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Полностью убираем прокрутку верхнего уровня */
        }
        iframe {
            width: 100vw;
            height: calc(100vh + 200px); /* Ровно на 200px выше экрана */
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://foxvideocommunity.wordpress.com"></iframe>
</body>
</html>
