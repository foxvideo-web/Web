<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Убираем прокрутку на странице */
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script>
        fetch('https://foxvideocommunity.wordpress.com')
          .then(response => response.text())
          .then(data => {
              document.querySelector('#container').innerHTML = data;
          })
          .catch(error => console.error('Ошибка:', error));
    </script>
</body>
</html>
